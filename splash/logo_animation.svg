<svg xmlns="http://www.w3.org/2000/svg" width="1254" height="1254" viewBox="0 0 1254 1254">
  <defs>
    <style>
      /* 定義路徑動畫 */
      @keyframes drawLine {
        to {
          stroke-dashoffset: 0;
        }
      }

      /* 外框的遮罩動畫設定 */
      .mask-box-path {
        fill: none;
        stroke: #ffffff;
        stroke-width: 130; /* 足夠粗以涵蓋原本的形狀 */
        stroke-linecap: round;
        stroke-linejoin: round;
        /* 長度設為略大於路徑總長 */
        stroke-dasharray: 2150;
        stroke-dashoffset: 2150;
        /* cubic-bezier 讓動畫更流暢生動 */
        animation: drawLine 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      /* 打勾的遮罩動畫設定 */
      .mask-check-path {
        fill: none;
        stroke: #ffffff;
        stroke-width: 130;
        stroke-linecap: round;
        stroke-linejoin: round;
        /* 長度設為略大於路徑總長 */
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        /* 延遲 0.3 秒開始畫 */
        animation: drawLine 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
      }
    </style>

    <mask id="mask-box">
      <path class="mask-box-path" d="M 830 335 L 380 335 Q 300 335 300 415 L 300 896 Q 300 976 380 976 L 847 976 Q 927 976 927 896 L 927 540" />
    </mask>

    <mask id="mask-check">
      <path class="mask-check-path" d="M 430 590 L 615 780 L 1080 270" />
    </mask>
  </defs>

