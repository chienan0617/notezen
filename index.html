<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    it to work correctly.

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <base href="/notezen/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Simple record anything in life">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Notezen">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Notezen</title>
  <link rel="manifest" href="manifest.json">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  
  
  
  
  
  <style id="splash-screen-style">
    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #111111;
      overflow: hidden;
    }

    #splash-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #111111;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .splash-logo-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Glowing circle behind the logo */
    .splash-glow {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.35) 0%, rgba(59, 130, 246, 0.1) 50%, rgba(0, 0, 0, 0) 70%);
      filter: blur(15px);
      animation: pulse-glow 3s infinite alternate ease-in-out;
    }

    @keyframes pulse-glow {
      0% {
        transform: scale(0.95);
        opacity: 0.6;
      }
      100% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    #splash-video {
      position: relative;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 2;
    }

    .loader-bar-container {
      width: 240px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #A855F7, #3B82F6, #A855F7);
      background-size: 200% 100%;
      animation: loading-animation 1.8s infinite linear;
      border-radius: 2px;
    }

    @keyframes loading-animation {
      0% {
        background-position: 200% 0;
      }
      100% {
        background-position: -200% 0;
      }
    }

    /* Elegant fade out */
    .fade-out {
      opacity: 0 !important;
      pointer-events: none;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      const splash = document.getElementById("splash-container");
      if (splash) {
        splash.classList.add("fade-out");
        setTimeout(() => {
          splash.remove();
        }, 600);
      }
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <div id="splash-container">
    <div class="splash-logo-container">
      <div class="splash-glow"></div>
      <video id="splash-video" autoplay muted playsinline onended="this.style.display='none'; document.getElementById('splash-icon').style.display='block';">
        <source src="splash/logo_animation.mp4" type="video/mp4">
      </video>
      <img id="splash-icon" src="icons/Icon-192.png" style="display: none; position: relative; width: 100%; height: 100%; object-fit: contain; z-index: 2;">
    </div>
    <div class="loader-bar-container">
      <div class="loader-bar"></div>
    </div>
  </div>

</body></html>
